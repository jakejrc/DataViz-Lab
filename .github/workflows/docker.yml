name: Build and Push to Docker Hub
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: jakejrc/dataviz-lab:latest,jakejrc/dataviz-lab:v1.0
          labels: |
            org.opencontainers.image.title=DataViz Lab
            org.opencontainers.image.description=Data visualization teaching system
            org.opencontainers.image.version=v1.0