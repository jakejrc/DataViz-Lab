<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码练习 - DataViz Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .CodeMirror { height: 350px; border-radius: 8px; font-size: 14px; }
        .exercise-item { cursor: pointer; transition: all 0.2s; }
        .exercise-item:hover { transform: translateX(5px); }
        .exercise-item.active { border-left: 4px solid #0d6efd; background: #f0f7ff; }
        .difficulty-1 { color: #28a745; }
        .difficulty-2 { color: #ffc107; }
        .difficulty-3 { color: #dc3545; }
        #output-area { background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', monospace;
                       min-height: 150px; max-height: 400px; overflow-y: auto; padding: 15px; border-radius: 8px; }
        #output-area .error { color: #f48771; }
        #output-area .success { color: #6a9955; }
        .plot-container { text-align: center; background: #fff; border-radius: 8px; padding: 10px; }
        .plot-container img { max-width: 100%; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-chart-bar me-2"></i>DataViz Lab</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/exercises"><i class="fas fa-code me-1"></i>代码练习</a></li>
                    <li class="nav-item"><a class="nav-link" href="/matplotlib_lab"><i class="fas fa-flask me-1"></i>可视化实验室</a></li>
                    <li class="nav-item"><a class="nav-link" href="/gallery"><i class="fas fa-images me-1"></i>图表画廊</a></li>
                    <li class="nav-item"><a class="nav-link" href="/data_clean"><i class="fas fa-broom me-1"></i>数据清洗</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row">
            <!-- 左侧：练习列表 -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-list me-2"></i>练习题库
                    </div>
                    <div class="card-body p-2">
                        <!-- 章节选择 -->
                        <select id="chapter-select" class="form-select form-select-sm mb-3">
                            <option value="ch2">第2章 - Python基础</option>
                            <option value="ch3">第3章 - NumPy</option>
                            <option value="ch4">第4章 - Pandas</option>
                            <option value="ch5">第5章 - 数据处理</option>
                        </select>
                        <!-- 题目列表 -->
                        <div id="exercise-list" class="list-group list-group-flush">
                            <div class="text-center text-muted py-3">
                                <i class="fas fa-spinner fa-spin"></i> 加载中...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 中间：代码编辑器 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-edit me-2"></i><span id="current-title">选择一道题目开始练习</span></span>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary me-1" onclick="resetCode()">
                                <i class="fas fa-undo me-1"></i>重置
                            </button>
                            <button class="btn btn-sm btn-success" onclick="runCode()">
                                <i class="fas fa-play me-1"></i>运行
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <textarea id="code-editor"></textarea>
                    </div>
                </div>

                <!-- 输出区域 -->
                <div class="card mt-3">
                    <div class="card-header">
                        <i class="fas fa-terminal me-2"></i>运行结果
                        <span id="run-status" class="ms-2"></span>
                    </div>
                    <div class="card-body p-0">
                        <div id="output-area">
                            <span class="text-muted">点击"运行"按钮执行代码...</span>
                        </div>
                        <div id="plot-area" class="plot-container" style="display:none;"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：题目说明 -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <i class="fas fa-info-circle me-2"></i>题目说明
                    </div>
                    <div class="card-body">
                        <div id="exercise-desc">
                            <p class="text-muted">请从左侧选择一道题目</p>
                        </div>
                        <hr>
                        <h6><i class="fas fa-lightbulb me-1 text-warning"></i>提示</h6>
                        <div id="exercise-hint">
                            <p class="text-muted small">选择题目后这里会显示提示信息</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script>
        // 初始化代码编辑器
        var editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'python',
            theme: 'dracula',
            lineNumbers: true,
            matchBrackets: true,
            autoCloseBrackets: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            lineWrapping: true
        });

        var currentExercises = [];
        var currentCode = '';

        // 加载练习题
        function loadExercises(chapter) {
            fetch('/api/exercises/' + chapter)
                .then(r => r.json())
                .then(data => {
                    currentExercises = data;
                    var html = '';
                    data.forEach(function(ex, i) {
                        var stars = '';
                        for (var s = 0; s < ex.difficulty; s++) stars += '<i class="fas fa-star"></i> ';
                        html += '<a class="list-group-item list-group-item-action exercise-item py-2" ' +
                                'onclick="selectExercise(' + i + ')" id="ex-' + i + '">' +
                                '<div class="d-flex justify-content-between align-items-center">' +
                                '<span class="small">' + ex.title + '</span>' +
                                '<span class="difficulty-' + ex.difficulty + '">' + stars + '</span>' +
                                '</div></a>';
                    });
                    document.getElementById('exercise-list').innerHTML = html;
                });
        }

        // 选择练习题
        function selectExercise(index) {
            var ex = currentExercises[index];
            currentCode = ex.template;

            // 高亮选中项
            document.querySelectorAll('.exercise-item').forEach(el => el.classList.remove('active'));
            document.getElementById('ex-' + index).classList.add('active');

            // 设置编辑器内容
            editor.setValue(ex.template);

            // 更新标题和说明
            document.getElementById('current-title').textContent = ex.title;
            document.getElementById('exercise-desc').innerHTML =
                '<h6>' + ex.title + '</h6><p class="text-muted">' + ex.desc + '</p>' +
                '<span class="badge bg-' + (ex.difficulty == 1 ? 'success' : ex.difficulty == 2 ? 'warning' : 'danger') + '">' +
                '难度: ' + '★'.repeat(ex.difficulty) + '</span>';

            document.getElementById('exercise-hint').innerHTML =
                '<p class="small">尝试修改代码中的参数，观察输出变化。</p>' +
                '<p class="small">如果遇到错误，仔细阅读错误信息，它会告诉你问题在哪一行。</p>';
        }

        // 运行代码
        function runCode() {
            var code = editor.getValue();
            if (!code.trim()) return;

            document.getElementById('output-area').innerHTML = '<span class="text-info"><i class="fas fa-spinner fa-spin"></i> 运行中...</span>';
            document.getElementById('plot-area').style.display = 'none';
            document.getElementById('run-status').innerHTML = '';

            fetch('/api/run_code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: code})
            })
            .then(r => r.json())
            .then(data => {
                var outputHtml = '';
                if (data.output) {
                    outputHtml += '<pre class="mb-0"><code>' + escapeHtml(data.output) + '</code></pre>';
                }
                if (data.error) {
                    outputHtml += '<pre class="mb-0 error"><code>' + escapeHtml(data.error) + '</code></pre>';
                }
                if (!data.output && !data.error) {
                    outputHtml = '<span class="text-muted">（无输出）</span>';
                }
                document.getElementById('output-area').innerHTML = outputHtml;

                if (data.has_plot) {
                    document.getElementById('plot-area').style.display = 'block';
                    document.getElementById('plot-area').innerHTML = '<img src="data:image/png;base64,' + data.plot_data + '">';
                }

                if (data.success) {
                    document.getElementById('run-status').innerHTML = '<span class="badge bg-success"><i class="fas fa-check me-1"></i>成功</span>';
                } else {
                    document.getElementById('run-status').innerHTML = '<span class="badge bg-danger"><i class="fas fa-times me-1"></i>错误</span>';
                }
            })
            .catch(err => {
                document.getElementById('output-area').innerHTML = '<span class="error">请求失败: ' + err + '</span>';
            });
        }

        // 重置代码
        function resetCode() {
            if (currentCode) {
                editor.setValue(currentCode);
            }
        }

        // HTML转义
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // 快捷键 Ctrl+Enter 运行
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });

        // 初始加载
        document.getElementById('chapter-select').addEventListener('change', function() {
            loadExercises(this.value);
        });
        loadExercises('ch2');
    </script>
</body>
</html>
